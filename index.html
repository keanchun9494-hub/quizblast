<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizBlast - AI Quiz Generator</title>
    </head>
<body>
    <script>
        // Line 620: Global Model Definition
        const GEMINI_MODEL = "gemini-2.5-flash-lite"; 

        async function callGemini(prompt, useSearch = false) {
            // Line 233: Function-level Model Definition
            const MODEL = "gemini-2.5-flash-lite";
            
            const apiKey = localStorage.getItem('gemini_api_key');
            if (!apiKey) {
                alert("Please set your API key in Settings (⚙️)");
                return null;
            }

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                const data = await response.json();
                if (data.error) {
                    throw new Error(data.error.message);
                }
                return data.candidates[0].content.parts[0].text;
            } catch (error) {
                console.error("Gemini Error:", error);
                alert("Error: " + error.message);
                return null;
            }
        }
        
        // [Rest of your script...]
    </script>
</body>
</html>
