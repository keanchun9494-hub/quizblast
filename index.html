<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>QuizBlast 🎯</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<style>
    /* Reset & Base */
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{min-height:100%;background:linear-gradient(135deg,#0d0d1a,#101028,#0d0d1e);color:#fff;font-family:'Poppins',sans-serif;overflow-x:hidden}
    
    /* Nav & Layout */
    nav{position:sticky;top:0;z-index:99;display:flex;align-items:center;justify-content:space-between;padding:13px 20px;background:rgba(13,13,26,0.88);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.07)}
    .logo{font-family:'Fredoka One',cursive;font-size:1.5rem;color:#ffe066;cursor:pointer}
    #app{max-width:720px;margin:0 auto;padding:16px 16px 80px}

    /* Screens */
    .screen{display:none;opacity:0;transform:translateY(10px);transition:all 0.3s ease}
    .screen.active{display:block;opacity:1;transform:translateY(0)}

    /* Cards & UI */
    .card{background:#161630;border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:24px;margin-bottom:16px}
    input,textarea{width:100%;padding:12px;border-radius:12px;border:1.5px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.07);color:#fff;outline:none;margin-bottom:10px}
    .btn{display:block;width:100%;padding:16px;border:none;border-radius:14px;font-weight:700;font-size:1rem;cursor:pointer;color:#fff;text-align:center;text-decoration:none;margin-bottom:10px}
    .btn-purple{background:linear-gradient(135deg,#7c3aed,#5b21b6)}
    .btn-ghost{background:transparent;border:1.5px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.8)}
    
    /* Typography */
    .h1{font-family:'Fredoka One',cursive;font-size:2.8rem;margin-bottom:10px}
    .h2{font-family:'Fredoka One',cursive;font-size:1.8rem;margin-bottom:20px}
    .accent{color:#ffe066}
    .muted{color:rgba(255,255,255,0.4);font-size:0.9rem}
    .center{text-align:center}

    /* Role Cards */
    .role-card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:25px;margin-bottom:15px;cursor:pointer;text-align:left}
    .role-card:hover{background:rgba(255,255,255,0.08)}
</style>
</head>
<body>

<nav>
  <span class="logo" onclick="goHome()">🎯 QuizBlast</span>
  <div id="nav-right"></div>
</nav>

<div id="app">
    <div id="s-home" class="screen active center">
        <div style="font-size:60px;margin:20px 0">🎯</div>
        <h1 class="h1 accent">QuizBlast!</h1>
        <p class="muted" style="margin-bottom:40px">AI-Powered Live Quiz Platform</p>
        
        <div class="role-card" onclick="show('s-teacher-login')">
            <h2>👨‍🏫 Teacher</h2>
            <p class="muted">Create quizzes and host live games</p>
        </div>
        <div class="role-card" onclick="show('s-student-login')">
            <h2>🎓 Student</h2>
            <p class="muted">Join a game with a room code</p>
        </div>
    </div>

    <div id="s-setup" class="screen">
        <div class="card">
            <h2 class="h2 accent center">Initial Setup</h2>
            <p class="muted center" style="margin-bottom:20px">Please configure your teacher account</p>
            <input type="password" id="setup-pass" placeholder="Create Teacher Password"/>
            <input type="password" id="setup-apikey" placeholder="Gemini API Key (AIza...)"/>
            <button class="btn btn-purple" onclick="saveSetup()">Save & Continue</button>
        </div>
    </div>

    <div id="s-teacher-login" class="screen">
        <div class="card">
            <h2 class="h2 center">Teacher Login</h2>
            <input type="password" id="t-login-pass" placeholder="Enter Password"/>
            <button class="btn btn-purple" onclick="teacherLogin()">Login</button>
            <button class="btn btn-ghost" onclick="show('s-home')">Back</button>
        </div>
    </div>

    <div id="s-teacher-dash" class="screen">
        <h2 class="h2 accent">Dashboard</h2>
        <button class="btn btn-purple" onclick="show('s-create-ai')">＋ Create Quiz with AI</button>
        <div id="saved-list"></div>
        <button class="btn btn-ghost" onclick="teacherLogout()">Logout</button>
    </div>

    <div id="s-create-ai" class="screen">
        <div class="card">
            <h2 class="h2 accent">AI Generator</h2>
            <textarea id="ai-topic" placeholder="Topic: e.g. Form 4 Biology Chapter 1" rows="4"></textarea>
            <button class="btn btn-purple" onclick="runAI()">Generate Quiz</button>
            <button class="btn btn-ghost" onclick="show('s-teacher-dash')">Cancel</button>
        </div>
    </div>
</div>

<script>
// ══ INITIALIZE ══════════════════════════════════════════════
const LS = {
    get: k => JSON.parse(localStorage.getItem(k)),
    set: (k, v) => localStorage.setItem(k, JSON.stringify(v))
};

function show(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    const el = document.getElementById(id);
    if(el) el.classList.add('active');
}

function goHome() { show('s-home'); }

// ══ AUTH & SETUP ════════════════════════════════════════════
function saveSetup() {
    const pass = document.getElementById('setup-pass').value;
    const key = document.getElementById('setup-apikey').value;
    if(pass && key) {
        LS.set('qb_pass', pass);
        LS.set('qb_apikey', key);
        LS.set('qb_init', true);
        show('s-teacher-login');
    } else {
        alert("Please fill in both fields");
    }
}

function teacherLogin() {
    const pass = document.getElementById('t-login-pass').value;
    if(pass === LS.get('qb_pass')) {
        renderSaved();
        show('s-teacher-dash');
    } else {
        alert("Wrong password!");
    }
}

function teacherLogout() { show('s-home'); }

// ══ AI GENERATION (1.5 FLASH) ═══════════════════════════════
async function runAI() {
    const topic = document.getElementById('ai-topic').value;
    const apiKey = LS.get('qb_apikey');
    const MODEL = "gemini-1.5-flash";
    
    if(!topic) return alert("Enter a topic");

    try {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${apiKey}`;
        const res = await fetch(url, {
            method: "POST",
            body: JSON.stringify({
                contents: [{ parts: [{ text: `Create a 5-question MCQ quiz about ${topic}. Return ONLY JSON format: {"title": "Quiz Name", "questions": [{"q": "Question?", "o": ["A","B","C","D"], "a": 0}]}` }]}],
                generationConfig: { response_mime_type: "application/json" }
            })
        });

        const data = await res.json();
        const quiz = JSON.parse(data.candidates[0].content.parts[0].text);
        
        // Save quiz
        const saved = LS.get('qb_saved') || [];
        saved.unshift(quiz);
        LS.set('qb_saved', saved);
        
        renderSaved();
        show('s-teacher-dash');
        alert("Quiz Created!");
    } catch (e) {
        alert("Error: " + e.message);
    }
}

function renderSaved() {
    const list = LS.get('qb_saved') || [];
    const container = document.getElementById('saved-list');
    container.innerHTML = list.map(q => `
        <div class="card">
            <h3>${q.title}</h3>
            <p class="muted">${q.questions.length} Questions</p>
        </div>
    `).join("");
}

// ══ RUN ON LOAD ═════════════════════════════════════════════
window.onload = () => {
    if(!LS.get('qb_init')) {
        show('s-setup');
    } else {
        show('s-home');
    }
};
</script>
</body>
</html>
